<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Havenly — Premium Real Estate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0D1B2A;
  --navy-mid:#1A2E44;
  --navy-light:#243C55;
  --gold:#C9A84C;
  --gold-light:#E8C97A;
  --gold-pale:#F9F3E3;
  --cream:#FAF8F4;
  --white:#FFFFFF;
  --ink:#1A1A1A;
  --mist:#8A9BB0;
  --rule:#E2DDD6;
  --rule-dark:rgba(255,255,255,0.1);
  --shadow:0 4px 24px rgba(13,27,42,0.12);
  --shadow-lg:0 16px 64px rgba(13,27,42,0.18);
}

html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 5%;
  transition:all 0.3s;
}
nav.scrolled{
  background:rgba(13,27,42,0.97);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--rule-dark);
  padding:0.85rem 5%;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:1.7rem;font-weight:600;
  color:var(--white);letter-spacing:0.02em;
  text-decoration:none;display:flex;align-items:center;gap:0.4rem;
}
.logo-dot{
  width:8px;height:8px;background:var(--gold);
  border-radius:50%;display:inline-block;
  margin-bottom:4px;
}
nav ul{display:flex;gap:2rem;list-style:none}
nav ul a{
  text-decoration:none;font-size:0.82rem;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.65);transition:color 0.2s;
}
nav ul a:hover{color:var(--gold-light)}
.nav-right{display:flex;align-items:center;gap:1rem}
.btn{
  font-family:'Outfit',sans-serif;font-weight:600;
  font-size:0.8rem;letter-spacing:0.06em;text-transform:uppercase;
  padding:0.65rem 1.5rem;border-radius:2px;cursor:pointer;
  border:none;text-decoration:none;display:inline-flex;
  align-items:center;gap:0.5rem;transition:all 0.22s;
}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn-outline-white{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.35)}
.btn-outline-white:hover{background:var(--white);color:var(--navy)}
.btn-navy{background:var(--navy);color:var(--white)}
.btn-navy:hover{background:var(--navy-mid)}
.btn-outline-navy{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
.btn-outline-navy:hover{background:var(--navy);color:var(--white)}
.btn-sm{padding:0.5rem 1rem;font-size:0.72rem}

/* HERO */
.hero{
  min-height:100vh;
  background:linear-gradient(165deg, var(--navy) 0%, var(--navy-mid) 50%, #1E3A52 100%);
  display:flex;flex-direction:column;justify-content:center;
  padding:8rem 5% 5rem;position:relative;overflow:hidden;
}
.hero-bg-pattern{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}
.hero-glow{
  position:absolute;top:-20%;right:-10%;
  width:700px;height:700px;
  background:radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 65%);
  pointer-events:none;
}
.hero-glow2{
  position:absolute;bottom:-20%;left:-5%;
  width:500px;height:500px;
  background:radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 65%);
  pointer-events:none;
}
.hero-content{max-width:750px;position:relative;z-index:1}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:0.75rem;
  font-size:0.72rem;font-weight:500;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--gold);
  margin-bottom:1.75rem;
  animation:fadeUp 0.7s ease both;
}
.hero-eyebrow::before,.hero-eyebrow::after{
  content:'';flex:1;min-width:24px;height:1px;background:var(--gold);opacity:0.5;
}
h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,6vw,5.5rem);
  font-weight:300;line-height:1.05;
  color:var(--white);letter-spacing:-0.01em;
  margin-bottom:1.5rem;
  animation:fadeUp 0.7s 0.1s ease both;
}
h1 em{font-style:italic;color:var(--gold-light)}
h1 strong{font-weight:700}
.hero-sub{
  font-size:1rem;line-height:1.75;
  color:rgba(255,255,255,0.5);
  max-width:500px;margin-bottom:3rem;font-weight:300;
  animation:fadeUp 0.7s 0.2s ease both;
}
.hero-actions{
  display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:4rem;
  animation:fadeUp 0.7s 0.3s ease both;
}
.hero-actions .btn{font-size:0.85rem;padding:0.85rem 2rem}
.hero-stats{
  display:flex;gap:3rem;
  animation:fadeUp 0.7s 0.4s ease both;
}
.hero-stat{}
.stat-n{
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;font-weight:600;color:var(--white);
  line-height:1;
}
.stat-n span{color:var(--gold)}
.stat-l{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.4);margin-top:0.25rem}

/* SEARCH BAR */
.search-bar{
  background:var(--white);
  border-radius:4px;
  padding:0.5rem 0.5rem 0.5rem 0;
  display:flex;align-items:center;
  box-shadow:var(--shadow-lg);
  margin:0 5% -40px;
  position:relative;z-index:10;
  border:1px solid var(--rule);
}
.search-field{
  flex:1;display:flex;align-items:center;
  padding:0.75rem 1.5rem;
  border-right:1px solid var(--rule);
}
.search-field:last-of-type{border-right:none}
.search-field label{
  font-size:0.62rem;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--mist);font-weight:600;
  display:block;margin-bottom:0.25rem;
}
.search-field select,.search-field input{
  font-family:'Outfit',sans-serif;
  font-size:0.88rem;font-weight:500;color:var(--ink);
  border:none;outline:none;background:transparent;
  width:100%;cursor:pointer;
}
.search-bar .btn{margin-left:0.5rem;flex-shrink:0;font-size:0.82rem;padding:1rem 1.75rem}

/* LISTINGS SECTION */
.listings-section{
  padding:7rem 5% 5rem;
}
.section-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem;
}
.section-eyebrow{
  font-size:0.68rem;font-weight:600;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--gold);margin-bottom:0.6rem;
}
h2{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.8rem,3vw,2.6rem);
  font-weight:600;line-height:1.15;color:var(--navy);
  letter-spacing:-0.01em;
}
h2 em{font-style:italic;color:var(--gold)}
.filter-tabs{display:flex;gap:0.4rem;flex-wrap:wrap}
.filter-tab{
  font-family:'Outfit',sans-serif;
  font-size:0.75rem;font-weight:500;letter-spacing:0.05em;
  padding:0.45rem 1.1rem;border-radius:2px;cursor:pointer;
  border:1.5px solid var(--rule);background:transparent;
  color:var(--mist);transition:all 0.2s;
}
.filter-tab:hover,.filter-tab.active{
  background:var(--navy);color:var(--white);border-color:var(--navy);
}

/* PROPERTY GRID */
.props-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:1.75rem;
}
.prop-card{
  background:var(--white);border-radius:6px;
  border:1px solid var(--rule);
  overflow:hidden;cursor:pointer;
  transition:transform 0.25s,box-shadow 0.25s;
}
.prop-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.prop-img{
  height:220px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));
}
.prop-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.prop-card:hover .prop-img img{transform:scale(1.04)}
.prop-img-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.2);font-size:3rem;gap:0.5rem;
}
.prop-img-placeholder span{font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase}
.prop-badge{
  position:absolute;top:1rem;left:1rem;
  font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  padding:0.3rem 0.7rem;border-radius:2px;
}
.badge-sale{background:var(--gold);color:var(--navy)}
.badge-rent{background:var(--navy);color:var(--white)}
.badge-new{background:#16a34a;color:var(--white)}
.badge-featured{background:rgba(201,168,76,0.9);color:var(--navy)}
.prop-save{
  position:absolute;top:1rem;right:1rem;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.9);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;border:none;
  transition:all 0.2s;color:var(--mist);
}
.prop-save:hover,.prop-save.saved{color:#e74c3c;background:var(--white)}
.prop-body{padding:1.4rem}
.prop-price{
  font-family:'Cormorant Garamond',serif;
  font-size:1.55rem;font-weight:700;color:var(--navy);
  margin-bottom:0.3rem;line-height:1;
}
.prop-price span{font-size:0.85rem;font-weight:400;color:var(--mist)}
.prop-title{
  font-size:0.92rem;font-weight:600;color:var(--ink);
  margin-bottom:0.3rem;line-height:1.4;
}
.prop-location{
  display:flex;align-items:center;gap:0.35rem;
  font-size:0.78rem;color:var(--mist);margin-bottom:1.1rem;
}
.prop-location svg{flex-shrink:0}
.prop-divider{height:1px;background:var(--rule);margin-bottom:1.1rem}
.prop-specs{display:flex;gap:1.25rem}
.spec{display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--mist);font-weight:500}
.spec-icon{font-size:0.9rem}
.prop-agent{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:1rem;padding-top:1rem;border-top:1px solid var(--rule);
}
.agent-info{display:flex;align-items:center;gap:0.6rem}
.agent-av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:700;color:var(--white);flex-shrink:0;
}
.agent-name{font-size:0.75rem;font-weight:600;color:var(--ink)}
.agent-label{font-size:0.65rem;color:var(--mist);text-transform:uppercase;letter-spacing:0.06em}
.prop-contact{font-size:0.72rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--gold);cursor:pointer;background:none;border:none;transition:color 0.2s;font-family:'Outfit',sans-serif}
.prop-contact:hover{color:var(--navy)}

/* EMPTY STATE */
.empty-state{
  grid-column:1/-1;text-align:center;
  padding:5rem 2rem;color:var(--mist);
}
.empty-icon{font-size:4rem;margin-bottom:1rem;opacity:0.4}
.empty-state h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--navy);margin-bottom:0.5rem}
.empty-state p{font-size:0.9rem;margin-bottom:1.5rem}

/* WHY US SECTION */
.why-section{
  background:var(--navy);padding:6rem 5%;
}
.why-section .section-eyebrow{color:var(--gold-light)}
.why-section h2{color:var(--white)}
.why-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;margin-top:3.5rem;
  border:1px solid var(--rule-dark);border-radius:4px;overflow:hidden;
}
.why-cell{
  padding:2.25rem;border-right:1px solid var(--rule-dark);
  transition:background 0.2s;
}
.why-cell:last-child{border-right:none}
.why-cell:hover{background:rgba(201,168,76,0.06)}
.why-icon{font-size:1.75rem;margin-bottom:1.25rem}
.why-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.1rem;font-weight:600;color:var(--white);
  margin-bottom:0.6rem;
}
.why-desc{font-size:0.82rem;color:rgba(255,255,255,0.4);line-height:1.65;font-weight:300}

/* CTA */
.cta-section{
  padding:7rem 5%;text-align:center;
  background:var(--gold-pale);
  border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);
  position:relative;overflow:hidden;
}
.cta-section::before{
  content:'HAVENLY';
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Cormorant Garamond',serif;
  font-size:18vw;font-weight:700;color:rgba(201,168,76,0.08);
  white-space:nowrap;pointer-events:none;
  letter-spacing:-0.05em;
}
.cta-section .section-eyebrow{display:block;margin-bottom:0.75rem}
.cta-section h2{margin-bottom:1rem}
.cta-section p{font-size:1rem;color:var(--mist);max-width:480px;margin:0 auto 2.5rem;line-height:1.7;font-weight:300}
.cta-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.cta-actions .btn{padding:0.9rem 2.25rem;font-size:0.85rem}

/* FOOTER */
footer{
  background:var(--navy);color:var(--white);
  padding:4rem 5% 2rem;
  border-top:1px solid rgba(255,255,255,0.06);
}
.footer-top{
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr;
  gap:3rem;margin-bottom:3rem;
}
.footer-brand .logo{display:block;margin-bottom:1rem;text-decoration:none;font-size:1.5rem}
.footer-brand p{font-size:0.82rem;color:rgba(255,255,255,0.35);line-height:1.7;max-width:240px;font-weight:300}
.footer-col h4{
  font-size:0.65rem;font-weight:600;letter-spacing:0.15em;
  text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:1.25rem;
}
.footer-col ul{list-style:none}
.footer-col ul li{margin-bottom:0.6rem}
.footer-col ul a{
  font-size:0.82rem;color:rgba(255,255,255,0.5);
  text-decoration:none;transition:color 0.2s;font-weight:300;
}
.footer-col ul a:hover{color:var(--gold-light)}
.footer-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.07);
  font-size:0.75rem;color:rgba(255,255,255,0.25);
}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(13,27,42,0.85);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--white);border-radius:8px;
  width:100%;max-width:740px;max-height:90vh;
  overflow-y:auto;
  transform:translateY(20px);transition:transform 0.3s;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:2rem 2rem 1.5rem;
  border-bottom:1px solid var(--rule);
  position:sticky;top:0;background:var(--white);z-index:1;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:600;color:var(--navy);
}
.modal-close{
  width:36px;height:36px;border-radius:50%;
  background:var(--cream);border:none;cursor:pointer;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  color:var(--mist);transition:all 0.2s;
}
.modal-close:hover{background:var(--rule);color:var(--ink)}
.modal-body{padding:2rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.form-group{display:flex;flex-direction:column;gap:0.45rem}
.form-group.full{grid-column:1/-1}
.form-label{
  font-size:0.72rem;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--mist);
}
.form-input,.form-select,.form-textarea{
  font-family:'Outfit',sans-serif;font-size:0.88rem;
  font-weight:400;color:var(--ink);
  background:var(--cream);border:1.5px solid var(--rule);
  border-radius:4px;padding:0.75rem 1rem;
  outline:none;transition:border-color 0.2s,background 0.2s;
  width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--gold);background:var(--white);
}
.form-textarea{resize:vertical;min-height:90px;line-height:1.6}
.form-section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;font-weight:600;color:var(--navy);
  margin:1.5rem 0 0.25rem;grid-column:1/-1;
  padding-top:1.25rem;border-top:1px solid var(--rule);
}
.form-section-title:first-child{margin-top:0;padding-top:0;border-top:none}
.img-upload-area{
  grid-column:1/-1;
  border:2px dashed var(--rule);border-radius:6px;
  padding:2rem;text-align:center;cursor:pointer;
  transition:border-color 0.2s,background 0.2s;background:var(--cream);
}
.img-upload-area:hover{border-color:var(--gold);background:var(--gold-pale)}
.img-upload-area input[type=file]{display:none}
.upload-icon{font-size:2rem;margin-bottom:0.5rem;color:var(--gold)}
.upload-text{font-size:0.82rem;color:var(--mist);line-height:1.6}
.upload-text strong{color:var(--ink)}
.img-previews{
  grid-column:1/-1;
  display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:0.5rem;
}
.img-preview{
  width:80px;height:80px;border-radius:4px;
  object-fit:cover;border:2px solid var(--rule);
  position:relative;
}
.img-preview-wrap{position:relative;width:80px;height:80px}
.img-remove{
  position:absolute;top:-6px;right:-6px;
  width:20px;height:20px;border-radius:50%;
  background:var(--navy);color:var(--white);
  border:none;cursor:pointer;font-size:0.6rem;
  display:flex;align-items:center;justify-content:center;
}
.amenities-grid{
  grid-column:1/-1;
  display:flex;flex-wrap:wrap;gap:0.6rem;
}
.amenity-check{
  display:flex;align-items:center;gap:0.5rem;
  font-size:0.8rem;font-weight:500;color:var(--ink);
  background:var(--cream);border:1.5px solid var(--rule);
  padding:0.45rem 0.9rem;border-radius:3px;cursor:pointer;
  transition:all 0.18s;user-select:none;
}
.amenity-check input{display:none}
.amenity-check.checked{background:var(--navy);color:var(--white);border-color:var(--navy)}
.modal-footer{
  padding:1.5rem 2rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--rule);gap:1rem;
}
.modal-footer .btn{padding:0.85rem 2rem;font-size:0.82rem}

/* DETAIL MODAL */
.detail-modal{max-width:860px}
.detail-img{
  height:340px;background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));
  position:relative;overflow:hidden;
}
.detail-img img{width:100%;height:100%;object-fit:cover}
.detail-img-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:5rem;color:rgba(255,255,255,0.15);
}
.detail-badges{
  position:absolute;top:1.25rem;left:1.25rem;display:flex;gap:0.5rem;
}
.detail-body{padding:2rem}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.detail-price{
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;font-weight:700;color:var(--navy);line-height:1;
}
.detail-price small{font-size:1rem;font-weight:400;color:var(--mist)}
.detail-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;font-weight:600;color:var(--ink);margin:0.3rem 0;
}
.detail-loc{font-size:0.85rem;color:var(--mist);display:flex;align-items:center;gap:0.3rem}
.detail-specs-row{
  display:flex;gap:2rem;flex-wrap:wrap;
  padding:1.25rem;background:var(--cream);border-radius:4px;
